id: com.chips.card-viewer
name: 卡片查看器
version: 0.1.0
type: app
entry: dist/index.html

description: 卡片查看器应用，用于通过统一卡片显示链路查看复合卡片内容。

author:
  name: CardViewer
  email: dev@chips.local

keywords:
  - chips
  - card
  - viewer

capabilities:
  - file-handler:.card
  - file-handler:.box

permissions:
  - card.read
  - box.read
  - plugin.read
  - platform.read
  - theme.read
  - i18n.read

engines:
  chips: "^1.0.0"

os:
  - darwin
  - win32
  - linux

ui:
  layout:
    owner: page
    unit: cpx
    baseWidth: 1024
  launcher:
    displayName: 卡片查看器
    icon: assets/icons/app-icon.ico
  window:
    chrome:
      titleBarStyle: default
