services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ccps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ccps_db
      POSTGRES_USER: ccps_user
      POSTGRES_PASSWORD: ccps_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccps_user -d ccps_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ccps_net

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ccps_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ccps_net

  # ─── MinIO ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ccps_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ccps_net

  # ─── API 服务器 ────────────────────────────────────────────────
  server:
    build:
      context: ../..
      dockerfile: Chips-CommunityPlatformServer/deploy/Dockerfile.server
    container_name: ccps_server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ccps_user:ccps_password@postgres:5432/ccps_db
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ccps_net

  # ─── Web 前端（生产构建）──────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: Chips-CommunityPlatformServer/deploy/Dockerfile.web
    container_name: ccps_web
    restart: unless-stopped
    networks:
      - ccps_net

  # ─── Admin 后台（生产构建）───────────────────────────────────
  admin:
    build:
      context: ../..
      dockerfile: Chips-CommunityPlatformServer/deploy/Dockerfile.admin
    container_name: ccps_admin
    restart: unless-stopped
    networks:
      - ccps_net

  # ─── Nginx（反向代理） ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ccps_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - web
      - admin
      - minio
    networks:
      - ccps_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ccps_net:
    driver: bridge
