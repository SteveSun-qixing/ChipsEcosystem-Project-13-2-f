id: chips.module.chips.htmltoimage.plugin
name: Chips HtmltoImage Plugin
version: 0.1.0
type: module
entry: dist/index.mjs
description: 消费目录态 HTML 中间产物并通过 Host 正式导出能力生成图片文件的原子转换模块。
author:
  name: sevenstars
  email: chips-htmltoimage-plugin@example.invalid
permissions:
  - platform.read
  - file.read
  - file.write
engines:
  chips: "^0.1.0"
os:
  - darwin
  - win32
  - linux
module:
  apiVersion: 1
  runtime: worker
  activation: onDemand
  provides:
    - capability: converter.html.to-image
      version: "1.0.0"
      methods:
        - name: convert
          mode: job
          inputSchema: contracts/convert.input.schema.json
          outputSchema: contracts/convert.output.schema.json
  consumes: []
