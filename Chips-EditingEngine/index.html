<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Content-Security-Policy:
    - 'unsafe-eval' is required by Chips Host's electron-loader.ts which uses indirect
      eval to load the electron module in the sandboxed renderer process.
    - 'unsafe-inline' is required because the formal Host card/editor iframe chain
      generates controlled inline bootstrap scripts inside sandboxed documents.
    - file: and blob: are allowed for local asset loading within the Electron context.
    This policy is suitable for a trusted desktop app environment.
  -->
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self' file: blob:;
      script-src 'self' 'unsafe-eval' 'unsafe-inline';
      style-src 'self' 'unsafe-inline';
      img-src 'self' file: data: blob: https:;
      font-src 'self' file: data:;
      connect-src 'self';
    "
  />
  <title>编辑引擎 — Chips Editing Engine</title>
</head>

<body>
  <!-- 依赖 Host 的 #root 规范 -->
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
