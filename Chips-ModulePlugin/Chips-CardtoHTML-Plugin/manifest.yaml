id: chips.module.chips.cardtohtml.plugin
name: Chips CardtoHTML Plugin
version: 0.1.0
type: module
entry: dist/index.mjs
description: 把卡片通过 Host 正式渲染链路导出为目录态或压缩态 HTML 的原子转换模块。
author:
  name: sevenstars
  email: chips-cardtohtml-plugin@example.invalid
permissions:
  - card.read
  - file.read
  - file.write
  - zip.manage
runtime:
  targets:
    desktop:
      supported: true
    web:
      supported: false
    mobile:
      supported: false
    headless:
      supported: true
engines:
  chips: "^0.1.0"
os:
  - darwin
  - win32
  - linux
module:
  apiVersion: 1
  runtime: worker
  activation: onDemand
  provides:
    - capability: converter.card.to-html
      version: "1.0.0"
      methods:
        - name: convert
          mode: job
          inputSchema: contracts/convert.input.schema.json
          outputSchema: contracts/convert.output.schema.json
  consumes: []
