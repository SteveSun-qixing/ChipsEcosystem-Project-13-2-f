id: chips.module.chips.fileconversion.plugin
name: Chips FileConversion Plugin
version: 0.1.0
type: module
entry: dist/index.mjs
description: 基于 chips-scaffold-module 生成的标准模块插件。
author:
  name: sevenstars
  email: chips-fileconversion-plugin@example.invalid
permissions:
  - file.read
  - file.write
  - module.read
  - module.invoke
runtime:
  targets:
    desktop:
      supported: true
    web:
      supported: false
    mobile:
      supported: false
    headless:
      supported: true
engines:
  chips: "^0.1.0"
os:
  - darwin
  - win32
  - linux
module:
  apiVersion: 1
  runtime: worker
  activation: onDemand
  provides:
    - capability: converter.file.convert
      version: "1.0.0"
      methods:
        - name: convert
          mode: job
          inputSchema: contracts/convert.input.schema.json
          outputSchema: contracts/convert.output.schema.json
  consumes:
    - capability: converter.card.to-html
      versionRange: ^1.0.0
    - capability: converter.html.to-pdf
      versionRange: ^1.0.0
    - capability: converter.html.to-image
      versionRange: ^1.0.0
