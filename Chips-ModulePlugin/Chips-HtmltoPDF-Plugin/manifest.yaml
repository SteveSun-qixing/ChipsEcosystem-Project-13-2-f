id: chips.module.chips.htmltopdf.plugin
name: Chips HtmltoPDF Plugin
version: 0.1.0
type: module
entry: dist/index.mjs
description: 基于 chips-scaffold-module 生成的标准模块插件。
author:
  name: sevenstars
  email: chips-htmltopdf-plugin@example.invalid
permissions: []
engines:
  chips: "^0.1.0"
os:
  - darwin
  - win32
  - linux
module:
  apiVersion: 1
  runtime: worker
  activation: onDemand
  provides:
    - capability: module.chips.htmltopdf.plugin
      version: "1.0.0"
      methods:
        - name: run
          mode: sync
          inputSchema: contracts/run.input.schema.json
          outputSchema: contracts/run.output.schema.json
        - name: runAsync
          mode: job
          inputSchema: contracts/runAsync.input.schema.json
          outputSchema: contracts/runAsync.output.schema.json
  consumes: []
