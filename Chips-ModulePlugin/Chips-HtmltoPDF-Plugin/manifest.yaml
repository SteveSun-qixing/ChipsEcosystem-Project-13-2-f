id: chips.module.chips.htmltopdf.plugin
name: Chips HtmltoPDF Plugin
version: 0.1.0
type: module
entry: dist/index.mjs
description: 消费目录态 HTML 中间产物并通过 Host 正式导出能力输出 PDF 的原子转换模块。
author:
  name: sevenstars
  email: chips-htmltopdf-plugin@example.invalid
permissions:
  - file.read
  - file.write
  - platform.read
runtime:
  targets:
    desktop:
      supported: true
    web:
      supported: false
    mobile:
      supported: false
    headless:
      supported: true
engines:
  chips: "^0.1.0"
os:
  - darwin
  - win32
  - linux
module:
  apiVersion: 1
  runtime: worker
  activation: onDemand
  provides:
    - capability: converter.html.to-pdf
      version: "1.0.0"
      methods:
        - name: convert
          mode: job
          inputSchema: contracts/convert.input.schema.json
          outputSchema: contracts/convert.output.schema.json
  consumes: []
