schemaVersion: "1.0.0"
id: "theme.theme.chips-official-default-theme"
name: "薯片官方 · 默认主题"
version: "1.0.0"
type: "theme"
publisher: "薯片官方"
description: "Chips 官方默认内置主题"
permissions:
  - "theme.read"

runtime:
  targets:
    desktop:
      supported: true
    web:
      supported: false
    mobile:
      supported: false
    headless:
      supported: true

entry:
  tokens: "dist/tokens.json"
  themeCss: "dist/theme.css"

# 主题相关配置（供 Theme Runtime 与生态工具使用）
themeId: "chips-official.default-theme"
displayName: "薯片官方 · 默认主题"
isDefault: true
parentTheme: ""

ui:
  layout:
    owner: page
    unit: cpx
    baseWidth: 1024
    contract: ./contracts/theme-interface.contract.json
    minFunctionalSet: ./contracts/theme-min-functional-set.json
