  # 安全错误
  xss_blocked: "检测到不安全的内容"
  invalid_url: "无效的URL"
  unsafe_protocol: "不安全的协议"
  
  # 运行时错误
  render_failed: "渲染失败"
  format_failed: "格式化失败"
  insert_failed: "插入失败"
  upload_failed: "上传失败: {reason}"
  
  # 图片错误
  image_too_large: "图片大小超过 {max}MB"
  unsupported_format: "不支持的文件格式"
  invalid_image: "无效的图片文件"
  
  # 编辑器错误
  editor_not_initialized: "编辑器未初始化"
  no_selection: "未选中文本"

